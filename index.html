<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description"
          content="A browser-only offline tool for exploring ISO 20022 financial message definitions and authoring Message Implementation Guides (MIG)">
    <title>ISO 20022 MIG Editor</title>
    <link rel="icon" type="image/svg+xml" href="icon.svg">
    <link rel="manifest" href="manifest.json">
    <script>
      // Register the offline service worker. Browsers only allow this in a secure
      // context (https / localhost); elsewhere register() rejects and we ignore it.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('sw.js')
            .catch((err) => console.error('Service worker registration failed:', err))
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
